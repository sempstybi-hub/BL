<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 24</title>
    <style>
        .tab-btn {
            padding: 8px 20px;
            border: none;
            cursor: pointer;
            background-color: #ddd;
        }
        .tab-btn.active {
            background-color: #007BFF;
            color: white;
        }
        .tab-content {
            display: none;
            padding: 12px;
            border: 1px solid #ccc;
            margin-top: 4px;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <button class="tab-btn active" onclick="switchTab(0)">Вкладка 1</button>
    <button class="tab-btn" onclick="switchTab(1)">Вкладка 2</button>
    <div id="tab0" class="tab-content active">Содержимое первой вкладки</div>
    <div id="tab1" class="tab-content">Содержимое второй вкладки</div>
    <script>
        function switchTab(idx) {
            const btns = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            btns.forEach((b, i) => b.classList.toggle('active', i === idx));
            contents.forEach((c, i) => c.classList.toggle('active', i === idx));
        }
    </script>
</body>
</html>
