<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 3</title>
    <style>
        input {
            background-color: gray;
            border: 1px solid black;
        }
        button {
            background-color: orange;
            border: none;
            padding: 4px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <input id="inp" />
    <button onclick="showAlert()">Вывод</button>
    <script>
        function showAlert() {
            alert(document.getElementById('inp').value);
        }
    </script>
</body>
</html>
