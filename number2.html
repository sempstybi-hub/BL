<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 2</title>
    <style>
        p {
            font-family: Arial;
            font-size: 16px;
        }
        button {
            background-color: blue;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <p id="text">Обычный текст</p>
    <button onclick="changeText()">Изменить</button>
    <script>
        function changeText() {
            document.getElementById('text').textContent = 'Текст изменен!';
        }
    </script>
</body>
</html>
