<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 7</title>
    <style>
        a {
            display: inline-block;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: 1px solid #0056b3;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="https://example.com" onclick="return confirmLink(event)">Перейти</a>
    <script>
        function confirmLink(e) {
            if (!confirm('Вы действительно хотите перейти?')) {
                e.preventDefault();
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
