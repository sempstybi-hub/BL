<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 13</title>
    <style>
        body {
            background: linear-gradient(to right, #f7971e, #ffd200);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        input, button {
            padding: 8px 16px;
            margin: 6px;
        }
    </style>
</head>
<body>
    <input id="nameInput" placeholder="Ваше имя" />
    <button onclick="greet()">Приветствие</button>
    <p id="greetMsg"></p>
    <script>
        function greet() {
            const name = document.getElementById('nameInput').value.trim();
            document.getElementById('greetMsg').textContent = name ? `Привет, ${name}!` : 'Привет, Гость!';
        }
    </script>
</body>
</html>
