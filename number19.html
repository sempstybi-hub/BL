<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 19</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: #f0f0f0;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 300px;
        }
        .del {
            cursor: pointer;
            font-weight: bold;
            color: red;
            font-size: 18px;
        }
        input, button {
            padding: 6px 12px;
            margin: 4px;
        }
    </style>
</head>
<body>
    <input id="todoInput" placeholder="Дело" />
    <button onclick="addTodo()">Добавить</button>
    <ul id="todoList"></ul>
    <script>
        function addTodo() {
            const inp = document.getElementById('todoInput');
            const text = inp.value.trim();
            if (!text) return;
            const li = document.createElement('li');
            li.innerHTML = `${text} <span class="del" onclick="this.parentElement.remove()">×</span>`;
            document.getElementById('todoList').appendChild(li);
            inp.value = '';
        }
    </script>
</body>
</html>
