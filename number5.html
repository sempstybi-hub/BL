<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 5</title>
    <style>
        body {
            background-color: lightgray;
            text-align: center;
            padding-top: 40px;
        }
        input, button {
            margin: 6px;
        }
    </style>
</head>
<body>
    <input id="numInput" />
    <button onclick="checkEven()">Проверить</button>
    <p id="result"></p>
    <script>
        function checkEven() {
            const val = parseInt(document.getElementById('numInput').value);
            const res = document.getElementById('result');
            if (isNaN(val)) {
                res.textContent = 'Введите число';
                return;
            }
            res.textContent = val % 2 === 0 ? 'Четное' : 'Нечетное';
        }
    </script>
</body>
</html>
