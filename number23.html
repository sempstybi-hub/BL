<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 23</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f1f3f5;
        }

        /* Карточка формы с тенями по условию */
        .feedback-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); /* Тени */
            width: 340px;
            box-sizing: border-box;
        }

        .feedback-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: #333333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #495057;
            font-weight: bold;
        }

        .input-field, .textarea-field {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .textarea-field {
            height: 90px;
            resize: none;
            font-family: inherit;
        }

        /* Изменение рамок при фокусе по условию задачи */
        .input-field:focus, .textarea-field:focus {
            border-color: #007bff; /* Синяя рамка */
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.25);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .success-msg {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            color: #28a745;
            min-height: 22px;
        }
    </style>
</head>
<body>

    <div class="feedback-card">
        <h3>Обратная связь</h3>
        <!-- Использование стандартного тега form -->
        <form id="feedbackForm">
            <div class="form-group">
                <label for="userName">Имя:</label>
                <input type="text" class="input-field" id="userName" placeholder="Иван" required>
            </div>
            <div class="form-group">
                <label for="userEmail">Email:</label>
                <input type="email" class="input-field" id="userEmail" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label for="userMessage">Сообщение:</label>
                <textarea class="textarea-field" id="userMessage" placeholder="Ваше сообщение..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Отправить</button>
        </form>
        <p class="success-msg" id="successOutput"></p>
    </div>

    <script>
        const feedbackForm = document.getElementById('feedbackForm');
        const userName = document.getElementById('userName');
        const successOutput = document.getElementById('successOutput');

        // Перехватываем событие отправки формы submit
        feedbackForm.addEventListener('submit', function(event) {
            // Блокируем перезагрузку страницы браузером
            event.preventDefault();

            const nameValue = userName.value.trim();

            // Выводим сообщение благодарности по условию
            successOutput.textContent = `Спасибо, ${nameValue}!`;
            successOutput.style.color = '#28a745';

            // Очищаем поля формы после успешной имитации отправки
            feedbackForm.reset();
        });
    </script>

</body>
</html>
