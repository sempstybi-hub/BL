<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 23</title>
    <style>
        .card {
            max-width: 400px;
            margin: 40px auto;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #007BFF;
            outline: none;
        }
        button {
            padding: 8px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <input id="fname" placeholder="Имя" />
        <input id="femail" placeholder="Email" />
        <textarea id="fmsg" placeholder="Сообщение"></textarea>
        <button onclick="sendForm()">Отправить</button>
        <p id="formResult"></p>
    </div>
    <script>
        function sendForm() {
            const name = document.getElementById('fname').value.trim() || 'Гость';
            document.getElementById('formResult').textContent = `Спасибо, ${name}!`;
        }
    </script>
</body>
</html>
