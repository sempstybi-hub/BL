<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 28</title>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            border: 1px solid #000;
            padding: 10px;
        }
        .thumb {
            width: 80px;
            height: 80px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .thumb:hover {
            border-color: #000;
        }
        .thumb.red { background: red; }
        .thumb.green { background: green; }
        .thumb.blue { background: blue; }
        .main-img {
            width: 260px;
            height: 200px;
            margin-top: 10px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="thumb red" onclick="changeMain('red')"></div>
        <div class="thumb green" onclick="changeMain('green')"></div>
        <div class="thumb blue" onclick="changeMain('blue')"></div>
    </div>
    <div class="main-img" id="mainDisplay">Красный</div>
    <script>
        function changeMain(color) {
            const main = document.getElementById('mainDisplay');
            main.style.backgroundColor = color;
            main.textContent = color.charAt(0).toUpperCase() + color.slice(1);
        }
    </script>
</body>
</html>
