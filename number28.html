<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 28</title>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            border: 1px solid #000;
            padding: 10px;
        }
        .thumb {
            width: 80px;
            height: 80px;
            cursor: pointer;
            border: 2px solid transparent;
            background-size: cover;
        }
        .thumb:hover {
            border-color: #000;
        }
        .thumb.red { background-image: url("ПУТЬ ИЛИ ССЫЛКА СВОЕЙ КАРТИНКИ"); }
        .thumb.green { background-image: url("ПУТЬ ИЛИ ССЫЛКА СВОЕЙ КАРТИНКИ"); }
        .thumb.blue { background-image: url("ПУТЬ ИЛИ ССЫЛКА СВОЕЙ КАРТИНКИ"); }
        .main-img {
            width: 260px;
            height: 200px;
            margin-top: 10px;
            border: 1px solid #000;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="thumb red" onclick="changeMain(this)"></div>
        <div class="thumb green" onclick="changeMain(this)"></div>
        <div class="thumb blue" onclick="changeMain(this)"></div>
    </div>
    <div class="main-img" id="mainDisplay"></div>
    <script>
        function changeMain(thumb) {
            const main = document.getElementById('mainDisplay');
            const bg = window.getComputedStyle(thumb).backgroundImage;
            main.style.backgroundImage = bg;
        }
    </script>
</body>
</html>
