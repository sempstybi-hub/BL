<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1</title>
    <style>
        /* Стиль для заголовка */
        h1 {
            color: blue;
            font-family: sans-serif;
        }

        /* Стиль для кнопки */
        .btn-green {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px; /* Скругленные углы */
            cursor: pointer;
            font-size: 16px;
        }

        /* Эффект при наведении для улучшения UX */
        .btn-green:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h1>Моя страница</h1>
    <button class="btn-green" id="actionButton">Нажми меня</button>

    <script>
        // Находим кнопку по ID и вешаем обработчик события клика
        document.getElementById('actionButton').addEventListener('click', function() {
            console.log('Кнопка нажата');
        });
    </script>

</body>
</html>
