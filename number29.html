<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 29</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
            max-width: 300px;
        }
        li {
            padding: 8px 12px;
            margin: 2px 0;
        }
        li:nth-child(odd) {
            background: #f0f0f0;
        }
        li:nth-child(even) {
            background: #ffffff;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <ul id="itemContainer"></ul>
    <button onclick="loadMore()">Загрузить еще</button>
    <script>
        let count = 0;
        function loadMore() {
            const container = document.getElementById('itemContainer');
            for (let i = 0; i < 5; i++) {
                count++;
                if (count > 50) {
                    document.querySelector('button').disabled = true;
                    break;
                }
                const li = document.createElement('li');
                li.textContent = 'Элемент ' + count;
                container.appendChild(li);
            }
        }
        // Инициализация
        loadMore();
    </script>
</body>
</html>
