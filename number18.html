<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 18</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            max-width: 200px;
        }
        .grid button {
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        input {
            width: 80px;
            padding: 4px;
            margin: 4px;
        }
    </style>
</head>
<body>
    <input id="num1" type="number" />
    <input id="num2" type="number" />
    <div class="grid">
        <button onclick="calc('+')">+</button>
        <button onclick="calc('-')">-</button>
        <button onclick="calc('*')">×</button>
        <button onclick="calc('/')">÷</button>
    </div>
    <p id="calcResult"></p>
    <script>
        function calc(op) {
            const a = parseFloat(document.getElementById('num1').value) || 0;
            const b = parseFloat(document.getElementById('num2').value) || 0;
            let res;
            switch(op) {
                case '+': res = a + b; break;
                case '-': res = a - b; break;
                case '*': res = a * b; break;
                case '/': res = b !== 0 ? a / b : 'Ошибка'; break;
            }
            document.getElementById('calcResult').textContent = res;
        }
    </script>
</body>
</html>
