<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 21</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        /* Кнопка открытия */
        .open-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Полупрозрачный фон (затемнение) по всему экрану */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Полупрозрачный фон */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            
            /* Скрыто по умолчанию */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Активное состояние фона */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Модальное окно по центру с тенью */
        .modal-content {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25); /* Тень */
            
            /* Анимация появления (масштабирование) по условию задачи */
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        /* Анимация при открытии окна */
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 20px;
        }

        /* Кнопка закрытия */
        .close-btn {
            padding: 8px 20px;
            font-size: 14px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .close-btn:hover {
            background-color: #bd2130;
        }
    </style>
</head>
<body>

    <button class="open-btn" id="openModalBtn">Открыть</button>

    <!-- Полупрозрачный фон модального окна -->
    <div class="modal-overlay" id="modalOverlay">
        <!-- Само модальное окно -->
        <div class="modal-content">
            <p>Это всплывающее модальное окно!</p>
            <button class="close-btn" id="closeModalBtn">Закрыть</button>
        </div>
    </div>

    <script>
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalOverlay = document.getElementById('modalOverlay');

        // Открытие окна по клику на кнопку «Открыть»
        openModalBtn.addEventListener('click', function() {
            modalOverlay.classList.add('active');
        });

        // Закрытие окна по клику на кнопку «Закрыть»
        closeModalBtn.addEventListener('click', function() {
            modalOverlay.classList.remove('active');
        });

        // Дополнительный UX: Закрытие окна при клике на темную область вокруг него
        modalOverlay.addEventListener('click', function(event) {
            if (event.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
    </script>

</body>
</html>
