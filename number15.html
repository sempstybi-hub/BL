<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 15</title>
    <style>
        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <input type="range" id="slider" min="0" max="100" value="50" />
    <button onclick="showPercent()">Показать</button>
    <p id="percentResult"></p>
    <script>
        function showPercent() {
            const val = document.getElementById('slider').value;
            document.getElementById('percentResult').textContent = `Выбрано ${val}%`;
        }
    </script>
</body>
</html>
