<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 9</title>
    <style>
        select {
            border: 1px solid #000;
            padding: 4px;
        }
        button {
            width: 100%;
            padding: 6px;
            margin-top: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <select id="daySelect">
        <option>Понедельник</option>
        <option>Вторник</option>
        <option>Среда</option>
        <option>Четверг</option>
        <option>Пятница</option>
        <option>Суббота</option>
        <option>Воскресенье</option>
    </select>
    <button onclick="showDay()">Выбрать</button>
    <p id="dayResult"></p>
    <script>
        function showDay() {
            const sel = document.getElementById('daySelect');
            document.getElementById('dayResult').textContent = 'Выбран ' + sel.value;
        }
    </script>
</body>
</html>
