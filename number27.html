<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 27</title>
    <style>
        .drop-zone {
            width: 150px;
            height: 150px;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            margin: 10px;
        }
        .drag-item {
            width: 150px;
            height: 150px;
            background: #2196F3;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            margin: 10px;
            cursor: grab;
        }
    </style>
</head>
<body>
    <div class="drag-item" draggable="true" ondragstart="drag(event)">Перетащи меня</div>
    <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">Сюда</div>
    <script>
        function allowDrop(e) {
            e.preventDefault();
        }
        function drag(e) {
            e.dataTransfer.setData('text', e.target.textContent);
        }
        function drop(e) {
            e.preventDefault();
            const data = e.dataTransfer.getData('text');
            e.target.textContent = data + ' (перенесено)';
        }
    </script>
</body>
</html>
