<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 4</title>
    <style>
        body {
            display: flex;
            gap: 10px;
            padding: 20px;
        }
        button {
            padding: 8px 20px;
            border: 1px solid #000;
            cursor: pointer;
            font-size: 16px;
        }
        .red {
            background-color: red;
            color: white;
        }
        .green {
            background-color: green;
            color: white;
        }
        .blue {
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body id="bg">
    <button class="red" onclick="setColor('red')">Красный</button>
    <button class="green" onclick="setColor('green')">Зеленый</button>
    <button class="blue" onclick="setColor('blue')">Синий</button>
    <script>
        function setColor(c) {
            document.getElementById('bg').style.backgroundColor = c;
        }
    </script>
</body>
</html>
