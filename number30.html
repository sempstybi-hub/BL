<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 30</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 350px;
            text-align: center;
        }
        .photo {
            width: 120px;
            height: 120px;
            background: #ccc;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }
        button {
            padding: 8px 24px;
            cursor: pointer;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            font-size: 16px;
        }
        button:hover {
            background: #5a6fd6;
        }
        #contacts {
            margin-top: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo">Фото</div>
        <h2>Иван Иванов</h2>
        <p>Студент, веб-разработчик</p>
        <button onclick="showContacts()">Показать контакты</button>
        <p id="contacts"></p>
    </div>
    <script>
        function showContacts() {
            document.getElementById('contacts').textContent = 'Email: ivan@example.com';
        }
    </script>
</body>
</html>
