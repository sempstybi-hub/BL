<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 25</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 6px 12px;
            margin: 4px 0;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .highlight {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <input id="searchInput" oninput="searchList()" placeholder="Поиск..." />
    <ul id="itemList">
        <li>Яблоко</li>
        <li>Банан</li>
        <li>Апельсин</li>
        <li>Груша</li>
        <li>Киви</li>
    </ul>
    <script>
        function searchList() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('#itemList li');
            items.forEach(li => {
                const text = li.textContent.toLowerCase();
                if (text.includes(q)) {
                    li.style.display = '';
                } else {
                    li.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
