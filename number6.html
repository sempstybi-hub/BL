<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 6</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9fb;
        }

        /* Вертикальный flex-контейнер для обеспечения одинаковой ширины элементов */
        .calc-form {
            display: flex;
            flex-direction: column;
            width: 250px; /* Фиксированная одинаковая ширина */
            gap: 12px;    /* Равномерные отступы между элементами */
        }

        .input-num {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #bbbbbb;
            border-radius: 4px;
            box-sizing: border-box; /* Чтобы padding не увеличивал ширину */
        }

        .btn-sum {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn-sum:hover {
            background-color: #45a049;
        }

        /* Стиль для абзаца с результатом */
        .result-output {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold; /* Жирное начертание по условию */
            text-align: center;
            color: #333333;
        }
    </style>
</head>
<body>

    <div class="calc-form">
        <input type="number" class="input-num" id="num1" placeholder="Первое число">
        <input type="number" class="input-num" id="num2" placeholder="Второе число">
        <button class="btn-sum" id="sumBtn">Сумма</button>
        <p class="result-output" id="resultLabel"></p>
    </div>

    <script>
        const num1Input = document.getElementById('num1');
        const num2Input = document.getElementById('num2');
        const sumBtn = document.getElementById('sumBtn');
        const resultLabel = document.getElementById('resultLabel');

        sumBtn.addEventListener('click', function() {
            const val1 = num1Input.value.trim();
            const val2 = num2Input.value.trim();

            // Проверка на заполненность обоих полей
            if (val1 === '' || val2 === '') {
                resultLabel.textContent = 'Заполните оба поля!';
                resultLabel.style.color = 'red';
                return;
            }

            // Преобразование строк в числа. Префикс '+' — это быстрый аналог Number()
            const sum = (+val1) + (+val2);

            // Вывод результата
            resultLabel.textContent = `Результат: ${sum}`;
            resultLabel.style.color = '#333333';
        });
    </script>

</body>
</html>
