<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 14</title>
    <style>
        button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button onclick="showTime()">Показать время</button>
    <p id="timeDisplay"></p>
    <script>
        function showTime() {
            const now = new Date();
            const t = now.toTimeString().slice(0, 8);
            document.getElementById('timeDisplay').textContent = t;
        }
    </script>
</body>
</html>
