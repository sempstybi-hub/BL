<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 12</title>
    <style>
        input[type="radio"] {
            margin: 0 10px 0 0;
        }
        label {
            margin-right: 20px;
        }
        button {
            margin-top: 10px;
            padding: 6px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <label><input type="radio" name="rate" value="1" /> 1</label>
    <label><input type="radio" name="rate" value="2" /> 2</label>
    <label><input type="radio" name="rate" value="3" /> 3</label>
    <button onclick="vote()">Голосовать</button>
    <p id="voteResult"></p>
    <script>
        function vote() {
            const radios = document.querySelectorAll('input[name="rate"]');
            let selected = null;
            for (const r of radios) {
                if (r.checked) selected = r.value;
            }
            const msg = document.getElementById('voteResult');
            msg.textContent = selected ? `Вы выбрали ${selected} звезд` : 'Выберите оценку';
        }
    </script>
</body>
</html>
