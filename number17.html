<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 17</title>
    <style>
        button {
            font-size: 28px;
            padding: 16px 32px;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.3);
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:active {
            background-color: #ffaa00;
        }
        #randNum {
            font-size: 48px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <button onclick="genRandom()">Случайное число</button>
    <div id="randNum"></div>
    <script>
        function genRandom() {
            const n = Math.floor(Math.random() * 100) + 1;
            document.getElementById('randNum').textContent = n;
        }
    </script>
</body>
</html>
