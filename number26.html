<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 26</title>
    <style>
        .accordion-item {
            border-bottom: 1px solid #ccc;
        }
        .accordion-header {
            padding: 10px;
            cursor: pointer;
            background: #f5f5f5;
        }
        .accordion-header:hover {
            background: #e0e0e0;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 10px;
        }
        .accordion-content.open {
            max-height: 200px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Заголовок 1</div>
        <div class="accordion-content">Текст 1</div>
    </div>
    <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Заголовок 2</div>
        <div class="accordion-content">Текст 2</div>
    </div>
    <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Заголовок 3</div>
        <div class="accordion-content">Текст 3</div>
    </div>
    <script>
        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            const isOpen = content.classList.contains('open');
            // Закрываем все
            document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
            if (!isOpen) {
                content.classList.add('open');
            }
        }
    </script>
</body>
</html>
