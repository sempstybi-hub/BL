<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 20</title>
    <style>
        /* Центрирование блока конвертера на странице */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        /* Блок конвертера с рамкой и внутренними отступами по условию */
        .converter-box {
            border: 2px solid #6c757d;    /* Рамка */
            padding: 30px;                /* Внутренние отступы */
            border-radius: 8px;
            background-color: #ffffff;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .converter-box h3 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: #333333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #495057;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        .input-field:focus {
            border-color: #007bff;
        }

        .convert-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .convert-btn:hover {
            background-color: #0056b3;
        }

        .result-display {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #28a745;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="converter-box">
        <h3>Конвертер валют</h3>
        
        <div class="form-group">
            <label for="rublesInput">Сумма в рублях:</label>
            <input type="number" class="input-field" id="rublesInput" placeholder="Например, 5000" min="0" step="any">
        </div>

        <div class="form-group">
            <label for="rateInput">Текущий курс доллара ($):</label>
            <input type="number" class="input-field" id="rateInput" placeholder="Например, 85.50" min="0.01" step="any">
        </div>

        <button class="convert-btn" id="convertBtn">Перевести</button>

        <p class="result-display" id="resultText"></p>
    </div>

    <script>
        const rublesInput = document.getElementById('rublesInput');
        const rateInput = document.getElementById('rateInput');
        const convertBtn = document.getElementById('convertBtn');
        const resultText = document.getElementById('resultText');

        convertBtn.addEventListener('click', function() {
            const rublesRaw = rublesInput.value.trim();
            const rateRaw = rateInput.value.trim();

            // Валидация на заполненность полей
            if (rublesRaw === '' || rateRaw === '') {
                resultText.textContent = 'Заполните все поля!';
                resultText.style.color = '#dc3545';
                return;
            }

            const rubles = Number(rublesRaw);
            const rate = Number(rateRaw);

            // Валидация на логическую корректность (отрицательные числа и деление на ноль)
            if (rubles < 0 || rate <= 0) {
                resultText.textContent = 'Некорректные значения!';
                resultText.style.color = '#dc3545';
                return;
            }

            // Математический расчет конвертации
            const dollars = rubles / rate;

            // Вывод результата с округлением до 2 знаков (валютный формат)
            resultText.textContent = `Итого: $${dollars.toFixed(2)}`;
            resultText.style.color = '#28a745';
        });
    </script>

</body>
</html>
