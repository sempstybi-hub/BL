<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 20</title>
    <style>
        .converter {
            border: 1px solid #000;
            padding: 20px;
            max-width: 300px;
            margin: 40px auto;
            text-align: center;
        }
        input, button {
            display: block;
            width: 90%;
            margin: 8px auto;
            padding: 6px;
        }
    </style>
</head>
<body>
    <div class="converter">
        <input id="rub" type="number" placeholder="Сумма в рублях" />
        <input id="rate" type="number" placeholder="Курс доллара" step="0.01" />
        <button onclick="convert()">Перевести</button>
        <p id="convertResult"></p>
    </div>
    <script>
        function convert() {
            const rub = parseFloat(document.getElementById('rub').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 1;
            document.getElementById('convertResult').textContent = (rub / rate).toFixed(2) + ' $';
        }
    </script>
</body>
</html>
