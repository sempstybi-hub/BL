<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 16</title>
    <style>
        textarea {
            width: 300px;
            max-width: 100%;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            padding: 6px;
        }
    </style>
</head>
<body>
    <textarea id="ta" oninput="countChars()"></textarea>
    <p id="charCount">Символов: 0</p>
    <script>
        function countChars() {
            const len = document.getElementById('ta').value.length;
            document.getElementById('charCount').textContent = `Символов: ${len}`;
        }
    </script>
</body>
</html>
